<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap JavaScript Plugins Demo</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>
        body {
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bootstrap JavaScript Plugins Demo</h1>

        <button class="btn btn-primary"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#demoContent">
            Toggle Content
        </button>

        <div class="collapse mt-3" id="demoContent">
            <div class="card card-body">
                This content is controlled by Bootstrap's JavaScript plugin.
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        console.log("Bootstrap loaded successfully");
    </script>

</body>
</html>
