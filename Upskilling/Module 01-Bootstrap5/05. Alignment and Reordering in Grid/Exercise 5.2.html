<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 5.2 - Column Reordering</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-4">
      <h2 class="mb-4">Reorder Columns on Desktop</h2>
      <div class="row g-3">
        <div class="col-12 col-md-6 order-md-2">
          <div class="p-4 bg-primary text-white rounded">
            Column A (order-md-2)
          </div>
        </div>
        <div class="col-12 col-md-6 order-md-1">
          <div class="p-4 bg-secondary text-white rounded">
            Column B (order-md-1)
          </div>
        </div>
      </div>
      <p class="text-muted mt-3 mb-0">
        On mobile, Column A appears first. On md and up, Column B appears first.
      </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
