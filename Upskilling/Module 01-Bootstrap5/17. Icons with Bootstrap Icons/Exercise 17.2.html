<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 17.2 - Icon Buttons</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-4">
      <h2 class="mb-4">Icon-only Buttons</h2>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-primary" aria-label="Edit">
          <i class="bi bi-pencil"></i>
        </button>
        <button class="btn btn-outline-success" aria-label="Save">
          <i class="bi bi-check2"></i>
        </button>
        <button class="btn btn-outline-danger" aria-label="Delete">
          <i class="bi bi-trash"></i>
        </button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
