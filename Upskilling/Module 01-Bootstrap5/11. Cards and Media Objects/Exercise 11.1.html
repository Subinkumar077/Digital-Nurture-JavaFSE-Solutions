<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 11.1 - Profile Card</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-4" style="max-width: 420px;">
      <div class="card">
        <img
          src="https://via.placeholder.com/600x320"
          class="card-img-top"
          alt="Profile"
        />
        <div class="card-body">
          <h5 class="card-title">Aarav Sharma</h5>
          <p class="card-text text-muted">
            Product designer who loves clean UI and thoughtful UX.
          </p>
          <a href="#" class="btn btn-primary">View Profile</a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
