<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 12.2 - Pricing Section</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-5">
      <div class="text-center mb-5">
        <h2 class="mb-2">Pricing Plans</h2>
        <p class="text-muted">Spacing utilities create breathing room.</p>
      </div>
      <div class="row g-4">
        <div class="col-md-4">
          <div class="card h-100 p-3">
            <h5 class="mb-3">Starter</h5>
            <h3 class="mb-4">$9</h3>
            <ul class="list-unstyled mb-4">
              <li class="mb-2">Basic analytics</li>
              <li class="mb-2">Email support</li>
            </ul>
            <button class="btn btn-outline-primary w-100">Choose</button>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card h-100 p-3 border-primary">
            <h5 class="mb-3">Growth</h5>
            <h3 class="mb-4">$29</h3>
            <ul class="list-unstyled mb-4">
              <li class="mb-2">Team dashboards</li>
              <li class="mb-2">Priority support</li>
            </ul>
            <button class="btn btn-primary w-100">Choose</button>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card h-100 p-3">
            <h5 class="mb-3">Enterprise</h5>
            <h3 class="mb-4">$99</h3>
            <ul class="list-unstyled mb-4">
              <li class="mb-2">Custom workflows</li>
              <li class="mb-2">Dedicated success</li>
            </ul>
            <button class="btn btn-outline-primary w-100">Choose</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
