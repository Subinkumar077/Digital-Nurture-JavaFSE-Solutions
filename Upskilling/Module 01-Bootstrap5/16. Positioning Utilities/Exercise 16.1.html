<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 16.1 - Fixed Footer</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-5">
      <h2 class="mb-3">Content Area</h2>
      <p class="text-muted">
        Scroll to see the fixed footer at the bottom of the viewport.
      </p>
    </div>
    <footer class="position-fixed bottom-0 w-100 bg-dark text-white py-2">
      <div class="container text-center">Fixed footer content</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
