<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 13.1 - Dashboard Colors</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-4">
      <h2 class="mb-4">Dashboard Overview</h2>
      <div class="row g-3">
        <div class="col-md-3">
          <div class="p-3 bg-primary text-white rounded">Sales</div>
        </div>
        <div class="col-md-3">
          <div class="p-3 bg-success text-white rounded">Growth</div>
        </div>
        <div class="col-md-3">
          <div class="p-3 bg-warning text-dark rounded">Alerts</div>
        </div>
        <div class="col-md-3">
          <div class="p-3 bg-info text-dark rounded">Traffic</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
