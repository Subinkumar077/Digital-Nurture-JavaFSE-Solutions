<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 14.2 - Responsive Sidebar</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <aside class="col-md-3 bg-light d-none d-md-block min-vh-100 p-4">
          <h5>Sidebar</h5>
          <ul class="list-unstyled">
            <li><a href="#" class="link-dark">Overview</a></li>
            <li><a href="#" class="link-dark">Reports</a></li>
            <li><a href="#" class="link-dark">Settings</a></li>
          </ul>
        </aside>
        <main class="col-12 col-md-9 p-4">
          <h2>Content Area</h2>
          <p class="text-muted">
            Sidebar appears on md and up. On smaller screens, only this content
            is visible.
          </p>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
