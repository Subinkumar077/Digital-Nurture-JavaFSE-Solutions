<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 14.1 - Display Utilities</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-4">
      <h2 class="mb-4">Display and Visibility</h2>
      <div class="p-3 mb-3 bg-light rounded d-none d-md-block">
        Visible on md and up (hidden on xs/sm).
      </div>
      <div class="p-3 mb-3 bg-light rounded d-none d-lg-flex">
        Visible on lg and up (flex display).
      </div>
      <div class="p-3 bg-light rounded">Always visible content.</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
