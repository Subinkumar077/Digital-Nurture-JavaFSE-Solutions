<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 6.1 - Flex Navbar</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="border-bottom">
      <div
        class="container d-flex flex-column flex-md-row align-items-md-center gap-3 py-3"
      >
        <span class="fw-bold">FlexNav</span>
        <nav class="d-flex flex-column flex-md-row gap-2 gap-md-4">
          <a class="text-decoration-none" href="#">Home</a>
          <a class="text-decoration-none" href="#">Services</a>
          <a class="text-decoration-none" href="#">Contact</a>
        </nav>
        <button class="btn btn-outline-primary ms-md-auto">Sign In</button>
      </div>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
