<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 15.2 - Shadows and Pills</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-4" style="max-width: 420px;">
      <div class="card shadow shadow-lg rounded-pill p-3">
        <div class="card-body">
          <h5 class="card-title">Premium Access</h5>
          <p class="card-text text-muted mb-0">
            This card uses <code>shadow</code>, <code>shadow-lg</code>, and
            <code>rounded-pill</code>.
          </p>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
