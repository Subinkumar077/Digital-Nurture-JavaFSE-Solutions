<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 7.1 - Typography Utilities</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-4">
      <h1 class="display-1">Display 1 Heading</h1>
      <p class="lead">This paragraph uses the <code>lead</code> class.</p>
      <p class="text-muted">Muted helper text for secondary info.</p>
      <p class="fw-bold">Bold text using <code>fw-bold</code>.</p>
      <p class="fst-italic">Italic text using <code>fst-italic</code>.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
