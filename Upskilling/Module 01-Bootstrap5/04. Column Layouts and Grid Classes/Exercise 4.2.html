<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 4.2 - Four Column Layout</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .tile {
        background-color: #0d6efd;
        color: #fff;
        border-radius: 6px;
        padding: 20px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container py-4">
      <h2 class="mb-4">Four Column Layout</h2>
      <div class="row g-3">
        <div class="col-12 col-sm-3">
          <div class="tile">Column 1</div>
        </div>
        <div class="col-12 col-sm-3">
          <div class="tile">Column 2</div>
        </div>
        <div class="col-12 col-sm-3">
          <div class="tile">Column 3</div>
        </div>
        <div class="col-12 col-sm-3">
          <div class="tile">Column 4</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
